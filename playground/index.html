<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toka Validator Playground</title>
    <!-- CodeMirror 6 is complex to bundle without npm, we'll use CodeMirror 5 for CDN simplicity but theme it to look modern -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo-area">
                <div class="logo-icon">T</div>
                <h1>Toka Playground <span>Validator</span></h1>
            </div>
            <div class="controls">
                <select id="example-select" class="glass-select">
                    <option value="hello">Hello World</option>
                    <option value="smart_ptr">Shared Smart Pointer (~)</option>
                    <option value="shape_match">Shape & Pattern Matching</option>
                    <option value="async_demo">Async Coroutines</option>
                </select>
                <button id="check-btn" class="glow-btn">Check Syntax</button>
            </div>
        </header>

        <main class="workspace">
            <div class="editor-pane">
                <textarea id="code-editor"></textarea>
            </div>
            <div class="output-pane">
                <div class="output-header">
                    <h3>Diagnostics</h3>
                    <div id="status-indicator" class="status-indicator">Loading Compiler...</div>
                </div>
                <div id="terminal" class="terminal-view">
                    <!-- Errors will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/mode/simple.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
    <!-- Load Toka Mode -->
    <script src="toka_mode.js"></script>
    <!-- Load WebAssembly API -->
    <script src="tokacheck.js"></script>
    <!-- Main App -->
    <script src="app.js"></script>
</body>
</html>
