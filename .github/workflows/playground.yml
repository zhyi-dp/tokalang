name: Deploy Toka Playground

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Compile Toka to WebAssembly
        run: |
          mkdir -p build_wasm
          cd build_wasm
          # Compile the Toka Frontend to Wasm
          # We include Lexer, Parser, Sema, SourceManager, DiagnosticEngine, Type, and wasm_api.cpp
          emcc -O3 -std=c++17 \
            -I../include \
            ../src/wasm_api.cpp \
            ../src/Lexer/Lexer.cpp \
            ../src/Parser/Parser.cpp \
            ../src/Parser/Parser_Decl.cpp \
            ../src/Parser/Parser_Expr.cpp \
            ../src/Parser/Parser_Stmt.cpp \
            ../src/Sema/Sema.cpp \
            ../src/Sema/Sema_Expr.cpp \
            ../src/Sema/Sema_Stmt.cpp \
            ../src/Sema/Sema_Template.cpp \
            ../src/Sema/Sema_Type.cpp \
            ../src/Sema/PAL_Checker.cpp \
            ../src/DiagnosticEngine.cpp \
            ../src/Basic/SourceManager.cpp \
            ../src/Type.cpp \
            -s WASM=1 \
            -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap", "stringToUTF8", "lengthBytesUTF8", "UTF8ToString"]' \
            -s EXPORTED_FUNCTIONS='["_check_toka_code", "_malloc", "_free"]' \
            -o tokacheck.js
            
          # Copy to playground directory
          cp tokacheck.js ../playground/
          cp tokacheck.wasm ../playground/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './playground'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
