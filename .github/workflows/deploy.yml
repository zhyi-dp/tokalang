name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Setup Emscripten ⚙️
        uses: mymindstorm/setup-emsdk@v14

      - name: Compile Toka Playground (Wasm) 🛠️
        run: |
          mkdir -p build_wasm
          cd build_wasm
          emcc -O3 -std=c++17 \
            -I../include \
            ../src/wasm_api.cpp \
            ../src/Lexer/Lexer.cpp \
            ../src/Parser/Parser.cpp \
            ../src/Parser/Parser_Decl.cpp \
            ../src/Parser/Parser_Expr.cpp \
            ../src/Parser/Parser_Stmt.cpp \
            ../src/Sema/Sema.cpp \
            ../src/Sema/Sema_Expr.cpp \
            ../src/Sema/Sema_Expr_Member.cpp \
            ../src/Sema/Sema_Expr_Unary.cpp \
            ../src/Sema/Sema_Expr_Binary.cpp \
            ../src/Sema/Sema_Expr_Call.cpp \
            ../src/Sema/Sema_Expr_Init.cpp \
            ../src/Sema/Sema_Expr_Closure.cpp \
            ../src/Sema/Sema_Stmt.cpp \
            ../src/Sema/Sema_Template.cpp \
            ../src/Sema/Sema_Type.cpp \
            ../src/Sema/PAL_Checker.cpp \
            ../src/DiagnosticEngine.cpp \
            ../src/Basic/SourceManager.cpp \
            ../src/Type.cpp \
            -s WASM=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap", "stringToUTF8", "lengthBytesUTF8", "UTF8ToString"]' \
            -s EXPORTED_FUNCTIONS='["_check_toka_code", "_malloc", "_free"]' \
            --embed-file ../lib@lib/ \
            -o tokacheck.js
          cp tokacheck.js ../playground/
          cp tokacheck.wasm ../playground/
          
          # Move playground to Astro public directory so it gets served under /playground
          mkdir -p ../website/public/playground
          cp -r ../playground/* ../website/public/playground/

      - name: Install dependencies 📦
        working-directory: ./website
        run: npm install

      - name: Build Astro 🚀
        working-directory: ./website
        run: npm run build

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          cname: tokalang.dev
          force_orphan: true
