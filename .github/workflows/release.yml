name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release on ${{ matrix.display_os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            display_os: Linux (x64)
            name: linux-x64
            pkg_cmd: OS=linux ARCH=x64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: macos-latest
            display_os: macOS (Intel)
            name: macos-x64
            pkg_cmd: OS=macos ARCH=x64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: macos-latest
            display_os: macOS (Apple Silicon)
            name: macos-arm64
            pkg_cmd: OS=macos ARCH=arm64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: windows-latest
            display_os: Windows (x64)
            name: windows-x64
            pkg_cmd: OS=windows ARCH=x64 bash ./tools/scripts/package_release.sh ${{ github.ref_name }}
            
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -o Acquire::Retries=5 || true
          wget --timeout=15 --tries=3 https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo -E ./llvm.sh 20
          sudo apt-get install -y liblld-20-dev lld-20 libpolly-20-dev
          
      - name: Install LLVM 20 (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.name }}" = "macos-x64" ]; then
            # Install an independent Intel Homebrew to fetch x86_64 bottles on Apple Silicon
            git clone --depth=1 https://github.com/Homebrew/brew ~/intel-brew
            arch -x86_64 ~/intel-brew/bin/brew install llvm@20 lld@20 || arch -x86_64 ~/intel-brew/bin/brew install llvm lld
            arch -x86_64 ~/intel-brew/bin/brew link --force llvm@20 || arch -x86_64 ~/intel-brew/bin/brew link --force llvm
          else
            brew install llvm@20 lld@20 || brew install llvm lld
            brew link --force llvm@20 || brew link --force llvm
          fi

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-polly
            make

      - name: Build Toka (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir build && cd build
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [ "${{ matrix.name }}" = "macos-x64" ]; then
              export LLVM_PATH=~/intel-brew/opt/llvm@20
              if [ ! -d "$LLVM_PATH" ]; then export LLVM_PATH=~/intel-brew/opt/llvm; fi
              export LLD_PATH=~/intel-brew/opt/lld@20
              if [ ! -d "$LLD_PATH" ]; then export LLD_PATH=~/intel-brew/opt/lld; fi
              CC=$LLVM_PATH/bin/clang CXX=$LLVM_PATH/bin/clang++ cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path) -DCMAKE_OSX_ARCHITECTURES=x86_64 -DLLVM_DIR=$LLVM_PATH/lib/cmake/llvm -DLLD_DIR=$LLD_PATH/lib/cmake/lld
            else
              export LLVM_PATH=$(brew --prefix llvm@20 || brew --prefix llvm)
              CC=$LLVM_PATH/bin/clang CXX=$LLVM_PATH/bin/clang++ cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path) -DCMAKE_OSX_ARCHITECTURES=arm64
            fi
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
          make -j4
          
          cd ..
          export TOKA_LIB=$GITHUB_WORKSPACE/lib
          
          # Compile Runtime
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [ "${{ matrix.name }}" = "macos-x64" ]; then
              export LLVM_PATH=~/intel-brew/opt/llvm@20
              if [ ! -d "$LLVM_PATH" ]; then export LLVM_PATH=~/intel-brew/opt/llvm; fi
              $LLVM_PATH/bin/clang -isysroot $(xcrun --show-sdk-path) -arch x86_64 -c $GITHUB_WORKSPACE/lib/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/sys/toka_rt.o
              $LLVM_PATH/bin/clang++ -isysroot $(xcrun --show-sdk-path) -arch x86_64 -O3 -c $GITHUB_WORKSPACE/lib/sys/llvm_shim.cpp -o $GITHUB_WORKSPACE/lib/sys/llvm_shim.o -I$LLVM_PATH/include
            else
              export LLVM_PATH=$(brew --prefix llvm@20 || brew --prefix llvm)
              $LLVM_PATH/bin/clang -isysroot $(xcrun --show-sdk-path) -arch arm64 -c $GITHUB_WORKSPACE/lib/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/sys/toka_rt.o
              $LLVM_PATH/bin/clang++ -isysroot $(xcrun --show-sdk-path) -arch arm64 -O3 -c $GITHUB_WORKSPACE/lib/sys/llvm_shim.cpp -o $GITHUB_WORKSPACE/lib/sys/llvm_shim.o -I$LLVM_PATH/include
            fi
          else
            clang-20 -c $GITHUB_WORKSPACE/lib/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/sys/toka_rt.o
            clang++-20 -O3 -c $GITHUB_WORKSPACE/lib/sys/llvm_shim.cpp -o $GITHUB_WORKSPACE/lib/sys/llvm_shim.o $(llvm-config-20 --cppflags)
          fi
          
          # Run full testing suite to verify compiler integrity (Native execution)
          bash ./tools/scripts/test_pass.sh || true
          cd build
          
          # Build toka CLI tool, tokafmt and tokalsp using the newly built compiler (Internal LLD)

          ./bin/tokac -I ../lib -I ../tools/toka ../tools/toka/src/main.tk -o ./bin/toka -O3
          ./bin/tokac -I ../lib -I ../tools/tokafmt ../tools/tokafmt/src/main.tk -o ./bin/tokafmt -O3
          ./bin/tokac -I ../lib -I ../tools/tokalsp ../tools/tokalsp/main.tk -o ./bin/tokalsp -O3

      - name: Build Toka (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          # Use Ninja for better stability on Windows CI
          cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          ninja
          
          cd ..
          export TOKA_LIB=$GITHUB_WORKSPACE/lib
          
          # Debug Windows Environment
          ldd ./build/bin/tokac.exe || echo "ldd failed"
          ls -la /mingw64/bin/ | grep -i polly || echo "No polly DLL"
          which clang || echo "clang not found"
          clang --version || echo "clang failed"
          ./build/bin/tokac.exe --version || echo "tokac version failed"
          
          # Compile Runtime
          set -x
          clang -c $GITHUB_WORKSPACE/lib/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/sys/toka_rt.o
          cp $GITHUB_WORKSPACE/lib/sys/toka_rt.o $GITHUB_WORKSPACE/lib/sys/toka_rt.obj
          clang++ -O3 -c $GITHUB_WORKSPACE/lib/sys/llvm_shim.cpp -o $GITHUB_WORKSPACE/lib/sys/llvm_shim.o
          cp $GITHUB_WORKSPACE/lib/sys/llvm_shim.o $GITHUB_WORKSPACE/lib/sys/llvm_shim.obj
          set +x
          
          # Run full testing suite to verify compiler integrity (Native execution)
          bash ./tools/scripts/test_pass.sh || true
          cd build

          cat << 'C_EOF' > test_abort.c
          #include <stdlib.h>
          int main() { abort(); }
          C_EOF
          clang test_abort.c -o test_abort.exe
          ./test_abort.exe || echo "abort exit code: $?"

          cat << 'C_EOF' > test_segv.c
          int main() { int *p = 0; *p = 1; }
          C_EOF
          clang test_segv.c -o test_segv.exe
          ./test_segv.exe || echo "segv exit code: $?"
          
          # Check file type
          file ./bin/tokac.exe || true
          
          # Compile native binaries on Windows
          ./bin/tokac.exe -I ../lib -I ../tools/toka ../tools/toka/src/main.tk -o ./bin/toka.exe -O3
          ./bin/tokac.exe -I ../lib -I ../tools/tokafmt ../tools/tokafmt/src/main.tk -o ./bin/tokafmt.exe -O3
          ./bin/tokac.exe -I ../lib -I ../tools/tokalsp ../tools/tokalsp/main.tk -o ./bin/tokalsp.exe -O3
          set +x

      - name: Run Package Script
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          ${{ matrix.pkg_cmd }}
          
      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/toka-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

