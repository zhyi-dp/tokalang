name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release on ${{ matrix.display_os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            display_os: Linux (x64)
            name: linux-x64
            pkg_cmd: OS=linux ARCH=x64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: macos-13
            display_os: macOS (Intel)
            name: macos-x64
            pkg_cmd: OS=macos ARCH=x64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: macos-latest
            display_os: macOS (Apple Silicon)
            name: macos-arm64
            pkg_cmd: OS=macos ARCH=arm64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: windows-latest
            display_os: Windows (x64)
            name: windows-x64
            pkg_cmd: OS=windows ARCH=x64 bash ./tools/scripts/package_release.sh ${{ github.ref_name }}
            
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -o Acquire::Retries=5 || true
          wget --timeout=15 --tries=3 https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo -E ./llvm.sh 20
          sudo apt-get install -y liblld-20-dev lld-20
          
      - name: Install LLVM 20 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20 lld@20 || brew install llvm lld

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-lld
            make

      - name: Build Toka (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j4
          
          # Build toka CLI tool, tokafmt and tokalsp using the newly built compiler (Internal LLD)
          export TOKA_LIB=$GITHUB_WORKSPACE/lib
          
          # Compile Runtime
          if [ "${{ runner.os }}" = "macOS" ]; then
            export LLVM_PATH=$(brew --prefix llvm@20 || brew --prefix llvm)
            $LLVM_PATH/bin/clang -isysroot $(xcrun --show-sdk-path) -c $GITHUB_WORKSPACE/lib/std/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o
          else
            clang-20 -c $GITHUB_WORKSPACE/lib/std/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o
          fi

          ./bin/tokac -I ../lib -I ../tools/toka ../tools/toka/src/main.tk $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o -o ./bin/toka -O3
          ./bin/tokac -I ../lib ../tools/tokafmt/src/main.tk $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o -o ./bin/tokafmt -O3
          ./bin/tokac -I ../lib ../tools/tokalsp/main.tk $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o -o ./bin/tokalsp -O3

      - name: Build Toka (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          make -j4
          
          export TOKA_LIB=$GITHUB_WORKSPACE/lib
          
          # Compile Runtime
          clang -c $GITHUB_WORKSPACE/lib/std/sys/toka_rt.c -o $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o

          ./bin/tokac.exe -I ../lib -I ../tools/toka ../tools/toka/src/main.tk $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o -o ./bin/toka.exe -O3
          ./bin/tokac.exe -I ../lib ../tools/tokafmt/src/main.tk $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o -o ./bin/tokafmt.exe -O3
          ./bin/tokac.exe -I ../lib ../tools/tokalsp/main.tk $GITHUB_WORKSPACE/lib/std/sys/toka_rt.o -o ./bin/tokalsp.exe -O3

      - name: Run Package Script
        shell: bash
        run: |
          ${{ matrix.pkg_cmd }}
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/toka-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

