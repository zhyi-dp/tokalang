name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            pkg_cmd: OS=linux ARCH=x64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
          - os: macos-latest
            name: macos-x64
            pkg_cmd: OS=macos ARCH=x64 ./tools/scripts/package_release.sh ${{ github.ref_name }}
            
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          
      - name: Install LLVM 20 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20 || brew install llvm

      - name: Build Toka (macOS/Linux)
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j4
          
          # Build toka CLI tool and tokafmt using the newly built compiler
          export TOKA_LIB=$GITHUB_WORKSPACE/lib
          ./bin/tokac ../tools/toka/src/main.tk -o ./bin/toka -O3
          ./bin/tokac ../tools/tokafmt/src/main.tk -o ./bin/tokafmt -O3
      - name: Run Package Script
        shell: bash
        run: |
          ${{ matrix.pkg_cmd }}
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/toka-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
