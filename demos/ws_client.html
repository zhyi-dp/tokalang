<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toka WebSocket Client</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat { width: 400px; height: 300px; background: #1e293b; border-radius: 8px; padding: 10px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #334155; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 4px; }
        .server { background: #3b82f6; align-self: flex-start; }
        .client { background: #10b981; align-self: flex-end; text-align: right; }
        .system { color: #94a3b8; font-size: 0.8em; text-align: center; }
        input { padding: 10px; width: 300px; border-radius: 4px; border: none; background: #334155; color: white; outline: none; }
        button { padding: 10px 15px; border: none; border-radius: 4px; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .controls { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h2>Toka WS Echo Demo</h2>
    <div id="chat"></div>
    <div class="controls">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" />
        <button onclick="sendMsg()">Send</button>
        <button onclick="connect()" style="background: #10b981;">Connect</button>
    </div>

    <script>
        let ws;
        const chat = document.getElementById('chat');
        const input = document.getElementById('msgInput');

        function log(msg, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = msg;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                log("Already connected.", 'system');
                return;
            }
            log("Connecting to ws://127.0.0.1:9099...", 'system');
            
            ws = new WebSocket('ws://127.0.0.1:9099/');
            
            ws.onopen = () => log("Connected to Toka Server!", 'system');
            
            ws.onmessage = (e) => log("Server: " + e.data, 'server');
            
            ws.onclose = () => log("Disconnected from server.", 'system');
            
            ws.onerror = (e) => log("WebSocket Error occurred.", 'system');
        }

        function sendMsg() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log("Not connected! Click Connect first.", 'system');
                return;
            }
            const val = input.value;
            if (!val) return;
            log("You: " + val, 'client');
            ws.send(val);
            input.value = '';
        }
        
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMsg();
        });
    </script>

</body>
</html>
